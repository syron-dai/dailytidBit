<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Brief Archive</title>
  <meta name="description" content="Archive of previous Daily Brief editions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{styles_path}}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header archive-header">
    <div class="masthead-top">
      <p class="edition-kicker">Daily Brief archive</p>
      <button type="button" class="theme-toggle" data-theme-toggle aria-label="Switch theme">◐</button>
    </div>

    <div class="masthead-main">
      <div>
        <p class="dateline">Past editions</p>
        <h1>Archive</h1>
        <p class="tagline">Browse earlier newsletters by date.</p>
      </div>

      <nav class="main-nav" aria-label="Primary">
        <a href="{{home_path}}">Today</a>
        <a href="{{archive_path}}" aria-current="page">Archive</a>
      </nav>
    </div>
  </header>

  <main id="main" class="archive-layout">
    {{archive_rows}}
  </main>

  <footer class="site-footer">
    <p><a href="{{home_path}}">Return to today’s edition</a></p>
  </footer>

  <script src="{{script_path}}" defer></script>
</body>
</html>
